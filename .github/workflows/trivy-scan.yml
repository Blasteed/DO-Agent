name: Run Trivy Scan

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push on DockerHub"]
    types:
      - completed

permissions:
  contents: read

jobs:
  trivy-scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on Noble Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/karfee111/do-agent:noble-latest'
          format: 'sarif'
          output: 'trivy-noble-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner on Trixie Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/karfee111/do-agent:trixie-latest'
          format: 'sarif'
          output: 'trivy-trixie-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Noble scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-noble-results.sarif
          category: noble-image

      - name: Upload Trivy Trixie scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-trixie-results.sarif
          category: trixie-image
